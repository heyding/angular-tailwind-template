<div class="min-h-full pt-16 pb-12 flex flex-col bg-white dark:bg-gray-900">
  <main
    class="flex-grow flex flex-col justify-center max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8"
  >
    <div class="flex-shrink-0 flex justify-center">
      <a href="/" class="inline-flex">
        <span class="sr-only">App</span>
        <img
          class="h-12 w-auto"
          src="https://tailwindui.com/img/logos/workflow-mark.svg?color=blue&shade=700"
          alt=""
        />
      </a>
    </div>
    <div class="py-16">
      <div class="text-center">
        <p class="text-sm font-semibold text-[#0077b6] dark:text-[#48cae4] uppercase tracking-wide">
          {{ '404.title' | translate }}
        </p>
        <h1
          class="mt-2 text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight sm:text-5xl"
        >
          {{ '404.headline' | translate }}
        </h1>
        <p class="mt-2 text-base text-gray-500 dark:text-gray-400">{{ '404.text' | translate }}</p>
        <div class="mt-6">
          <a
            href="#"
            class="text-base font-medium text-[#0077b6] dark:text-[#48cae4] hover:text-[#023e8a] dark:hover:text-[#90e0ef]"
            >{{ '404.button.back-to-start' | translate }} <span aria-hidden="true"> &rarr;</span></a
          >
        </div>
      </div>
    </div>
  </main>
</div>
