openapi: 3.0.3
info:
  title: Angular Tailwind Template Demo API
  version: 1.0.0
  description: Minimal OpenAPI spec used to generate typed Angular API clients.
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /users:
    get:
      operationId: getUsers
      summary: Get all users
      tags:
        - Users
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/{id}:
    get:
      operationId: getUserById
      summary: Get user by id
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /posts:
    get:
      operationId: getPosts
      summary: Get all posts
      tags:
        - Posts
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Post list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      operationId: createPost
      summary: Create a post
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Created post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
  /posts/{id}:
    put:
      operationId: updatePost
      summary: Replace a post
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Updated post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
    patch:
      operationId: patchPost
      summary: Patch a post
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Patched post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
    delete:
      operationId: deletePost
      summary: Delete a post
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Post deleted
components:
  schemas:
    Geo:
      type: object
      properties:
        lat:
          type: string
        lng:
          type: string
      required:
        - lat
        - lng
    Address:
      type: object
      properties:
        street:
          type: string
        suite:
          type: string
        city:
          type: string
        zipcode:
          type: string
        geo:
          $ref: '#/components/schemas/Geo'
      required:
        - street
        - city
        - zipcode
    Company:
      type: object
      properties:
        name:
          type: string
        catchPhrase:
          type: string
        bs:
          type: string
      required:
        - name
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        company:
          $ref: '#/components/schemas/Company'
      required:
        - id
        - name
        - email
    Post:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        body:
          type: string
      required:
        - id
        - userId
        - title
        - body
    PostInput:
      type: object
      properties:
        userId:
          type: integer
        title:
          type: string
        body:
          type: string
      required:
        - userId
        - title
        - body
